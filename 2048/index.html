<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="description" content="2048ゲーム by tayooo — タイルをスライドして2048を目指そう！">
  <meta property="og:title" content="2048 | tayooo">
  <meta property="og:description" content="2048ゲーム by tayooo — タイルをスライドして2048を目指そう！">
  <title>2048 | tayooo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --fh: 'Bebas Neue', sans-serif;
      --fb: 'Noto Sans JP', sans-serif;
      --accent: #f5811c;
      --sub: #3c5159;
      --text: #201d1e;
      --bg: #F5F5F5;
      --border: rgba(60, 81, 89, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--fb);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--fh);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0.06em;
    }

    .logo .accent { color: var(--accent); }

    .header-title {
      font-family: var(--fh);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 14px;
    }

    /* Score area */
    .score-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(95vw, 500px);
    }

    .score-box {
      font-family: var(--fh);
      background: var(--sub);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      min-width: 88px;
      text-align: center;
    }

    .score-label {
      display: block;
      font-size: 0.6rem;
      opacity: 0.7;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 1.4rem;
      line-height: 1.2;
    }

    /* Buttons */
    .btn {
      font-family: var(--fb);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: opacity 80ms ease;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { opacity: 0.75; }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-accent {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Grid */
    .grid-outer {
      position: relative;
      width: min(95vw, calc(95dvh - 200px), 500px);
    }

    .grid-bg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
      background: rgba(60, 81, 89, 0.12);
      border-radius: 8px;
      aspect-ratio: 1;
    }

    .cell {
      background: rgba(60, 81, 89, 0.08);
      border-radius: 6px;
    }

    .grid-tiles {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
    }

    /* Tiles */
    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-family: var(--fh);
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      transition: background-color 80ms ease;
      user-select: none;
    }

    @keyframes tile-appear {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .tile-new { animation: tile-appear 180ms ease forwards; }

    @keyframes tile-merge {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .tile-merged { animation: tile-merge 150ms ease forwards; }

    /* Tile colors */
    .tile-2    { background: #f0ebe4; color: #201d1e; }
    .tile-4    { background: #e0d5c8; color: #201d1e; }
    .tile-8    { background: #cfc0af; color: #201d1e; }
    .tile-16   { background: #f5a55a; color: white; }
    .tile-32   { background: #f5811c; color: white; }
    .tile-64   { background: #d96800; color: white; }
    .tile-128  { background: #5a7a85; color: white; }
    .tile-256  { background: #3c5159; color: white; }
    .tile-512  { background: #2a3d45; color: white; }
    .tile-1024 { background: #e05a3a; color: white; font-size: clamp(1rem, 3.5vw, 1.8rem); }
    .tile-2048 { background: #c03a1e; color: white; box-shadow: 0 0 20px rgba(192,58,30,0.6); font-size: clamp(1rem, 3.5vw, 1.8rem); }
    .tile-super { background: #201d1e; color: #f5811c; font-size: clamp(0.8rem, 2.8vw, 1.5rem); }

    /* Overlays */
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
    }

    .overlay.win      { background: rgba(245, 129, 28, 0.92); }
    .overlay.gameover { background: rgba(32, 29, 30, 0.88); }

    .overlay-title {
      font-family: var(--fh);
      font-size: clamp(2.2rem, 9vw, 3.8rem);
      color: white;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .overlay-score {
      color: white;
      font-size: 1rem;
      opacity: 0.9;
    }

    .overlay-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .overlay .btn {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      color: white;
    }

    .overlay .btn:hover:not(:disabled) { background: rgba(255,255,255,0.35); }
    .overlay .btn-accent { background: var(--accent); border-color: var(--accent); }

    .hidden { display: none !important; }

    .instructions {
      font-size: 0.78rem;
      color: var(--sub);
      opacity: 0.6;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <a href="https://tayooo.com" class="logo">TAY<span class="accent">OOO</span></a>
  <span class="header-title">2048</span>
</header>

<main>
  <div class="score-area">
    <div class="score-box">
      <span class="score-label">Score</span>
      <span class="score-value" id="score-val">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Best</span>
      <span class="score-value" id="best-val">0</span>
    </div>
    <button class="btn" id="undo-btn" onclick="undo()" disabled>↩ UNDO</button>
    <button class="btn btn-accent" onclick="newGame()">NEW GAME</button>
  </div>

  <div class="grid-outer" id="board-el">
    <div class="grid-bg">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <div class="grid-tiles" id="tiles-grid"></div>

    <div class="overlay win hidden" id="win-overlay">
      <div class="overlay-title">🎉 YOU WIN!</div>
      <div class="overlay-score" id="win-score-txt"></div>
      <div class="overlay-btns">
        <button class="btn" onclick="continueGame()">Continue</button>
        <button class="btn btn-accent" onclick="newGame()">New Game</button>
      </div>
    </div>

    <div class="overlay gameover hidden" id="gameover-overlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-score" id="gameover-score-txt"></div>
      <div class="overlay-btns">
        <button class="btn btn-accent" onclick="newGame()">New Game</button>
      </div>
    </div>
  </div>

  <div class="instructions">← ↑ ↓ → キーまたはスワイプで操作</div>
</main>

<script>
  let board, score, bestScore, undoStack, hasWon, gameRunning;

  bestScore = parseInt(localStorage.getItem('2048-best') || '0');

  function newGame() {
    board = Array.from({length: 4}, () => Array(4).fill(null));
    score = 0;
    undoStack = [];
    hasWon = false;
    gameRunning = true;
    hideOverlays();
    spawnTile();
    spawnTile();
    render();
    updateUI();
  }

  function cloneBoard(b) {
    return b.map(row => row.map(c => c ? {...c} : null));
  }

  function spawnTile() {
    const empties = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (!board[r][c]) empties.push([r, c]);
    if (!empties.length) return;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    board[r][c] = { value: Math.random() < 0.9 ? 2 : 4, isNew: true, isMerged: false };
  }

  function slideRow(cells) {
    const vals = cells.map(c => c ? c.value : 0).filter(v => v > 0);
    const result = [];
    let add = 0;
    let i = 0;
    while (i < vals.length) {
      if (i + 1 < vals.length && vals[i] === vals[i + 1]) {
        const m = vals[i] * 2;
        add += m;
        result.push({ value: m, isNew: false, isMerged: true });
        i += 2;
      } else {
        result.push({ value: vals[i], isNew: false, isMerged: false });
        i++;
      }
    }
    while (result.length < 4) result.push(null);
    return { row: result, add };
  }

  function move(dir) {
    if (!gameRunning) return;

    const oldBoard = cloneBoard(board);
    const oldScore = score;
    const nb = Array.from({length: 4}, () => Array(4).fill(null));
    let scoreAdd = 0;

    if (dir === 'left') {
      for (let r = 0; r < 4; r++) {
        const { row, add } = slideRow(board[r]);
        nb[r] = row;
        scoreAdd += add;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < 4; r++) {
        const { row, add } = slideRow([...board[r]].reverse());
        nb[r] = row.reverse();
        scoreAdd += add;
      }
    } else if (dir === 'up') {
      for (let c = 0; c < 4; c++) {
        const col = board.map(row => row[c]);
        const { row, add } = slideRow(col);
        for (let r = 0; r < 4; r++) nb[r][c] = row[r];
        scoreAdd += add;
      }
    } else if (dir === 'down') {
      for (let c = 0; c < 4; c++) {
        const col = board.map(row => row[c]).reverse();
        const { row, add } = slideRow(col);
        const unrev = row.reverse();
        for (let r = 0; r < 4; r++) nb[r][c] = unrev[r];
        scoreAdd += add;
      }
    }

    let changed = false;
    outer: for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        const ov = oldBoard[r][c] ? oldBoard[r][c].value : 0;
        const nv = nb[r][c] ? nb[r][c].value : 0;
        if (ov !== nv) { changed = true; break outer; }
      }

    if (!changed) return;

    if (undoStack.length >= 3) undoStack.shift();
    undoStack.push({ board: oldBoard, score: oldScore, hadWon: hasWon });
    board = nb;
    score += scoreAdd;

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('2048-best', bestScore);
    }

    spawnTile();
    render();
    updateUI();

    if (!hasWon) {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (board[r][c] && board[r][c].value === 2048) {
            hasWon = true;
            gameRunning = false;
            document.getElementById('win-score-txt').textContent = `Score: ${score}`;
            document.getElementById('win-overlay').classList.remove('hidden');
            return;
          }
    }

    if (isGameOver()) {
      gameRunning = false;
      document.getElementById('gameover-score-txt').textContent = `Score: ${score}`;
      document.getElementById('gameover-overlay').classList.remove('hidden');
    }
  }

  function isGameOver() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        if (!board[r][c]) return false;
        const v = board[r][c].value;
        if (c < 3 && board[r][c+1] && board[r][c+1].value === v) return false;
        if (r < 3 && board[r+1][c] && board[r+1][c].value === v) return false;
      }
    return true;
  }

  function undo() {
    if (!undoStack.length) return;
    const prev = undoStack.pop();
    board = prev.board;
    score = prev.score;
    hasWon = prev.hadWon;
    gameRunning = true;
    hideOverlays();
    render();
    updateUI();
  }

  function continueGame() {
    gameRunning = true;
    document.getElementById('win-overlay').classList.add('hidden');
  }

  function hideOverlays() {
    document.getElementById('win-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
  }

  function render() {
    const grid = document.getElementById('tiles-grid');
    grid.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const cell = board[r][c];
        if (!cell) continue;
        const tile = document.createElement('div');
        const valCls = cell.value <= 2048 ? `tile-${cell.value}` : 'tile-super';
        tile.className = `tile ${valCls}`;
        if (cell.isNew) tile.classList.add('tile-new');
        if (cell.isMerged) tile.classList.add('tile-merged');
        tile.style.gridColumn = c + 1;
        tile.style.gridRow = r + 1;
        tile.textContent = cell.value;
        grid.appendChild(tile);
      }
    }
  }

  function updateUI() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('best-val').textContent = bestScore;
    const left = undoStack.length;
    document.getElementById('undo-btn').textContent = `↩ ${left}`;
    document.getElementById('undo-btn').disabled = left === 0;
  }

  document.addEventListener('keydown', e => {
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  const MIN_SWIPE = 30;
  let touchStartX = 0, touchStartY = 0;
  const boardEl = document.getElementById('board-el');

  boardEl.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  boardEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < MIN_SWIPE) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  });

  newGame();
</script>
</body>
</html>
