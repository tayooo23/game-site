<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="description" content="1024ゲーム by tayooo — タイルをスライドして1024を目指そう！">
  <title>1024 | tayooo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="https://tayooo.com" class="logo">TAY<span class="accent">OOO</span></a>
  <span class="header-title">1024</span>
</header>

<main>
  <div class="score-area">
    <div class="score-box">
      <span class="score-label">Score</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Best</span>
      <span class="score-value" id="best">0</span>
    </div>
    <button class="btn" id="btn-undo" disabled>↩ 0</button>
    <button class="btn btn-accent" id="btn-new">NEW GAME</button>
  </div>

  <div class="grid-outer">
    <div class="grid-bg">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <div class="grid-tiles" id="grid-tiles"></div>

    <div class="overlay" id="overlay" hidden>
      <div class="overlay-title" id="overlay-title"></div>
      <div class="overlay-sub"   id="overlay-sub"></div>
      <div class="overlay-actions" id="overlay-actions"></div>
    </div>
  </div>

  <div class="instructions">← ↑ ↓ → キーまたはスワイプで操作 &nbsp;·&nbsp; U = undo</div>
</main>

<script src="game.js"></script>
</body>
</html>
